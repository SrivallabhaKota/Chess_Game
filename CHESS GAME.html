<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LLM Chess</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <style>
        /* --- Theme Configuration via CSS Variables --- */
        body[data-theme="dark"] {
            --bg-color: rgb(16, 24, 39);
            --text-color: #f3f4f6;
            --board-light: #9ca3af;
            --board-dark: #4b5563;
            --hud-bg: rgba(255, 255, 255, 0.05);
            --border-color: #374151;
            --accent-color: #3b82f6;
            --dot-color: rgba(255, 255, 255, 0.3);
            --font-family: system-ui, -apple-system, sans-serif;
            --piece-filter: drop-shadow(2px 4px 6px rgba(0,0,0,0.4));
            --modal-bg: rgba(16, 24, 39, 0.95);
        }

        body[data-theme="classic"] {
            --bg-color: #f4f1ea;
            --text-color: #2c2520;
            --board-light: #f0d9b5;
            --board-dark: #b58863;
            --hud-bg: rgba(0, 0, 0, 0.05);
            --border-color: #8b5a2b;
            --accent-color: #8b5a2b;
            --dot-color: rgba(0, 0, 0, 0.3);
            --font-family: Georgia, serif;
            --piece-filter: drop-shadow(2px 4px 6px rgba(0,0,0,0.5));
            --modal-bg: rgba(244, 241, 234, 0.95);
        }

        body[data-theme="terminal"] {
            --bg-color: #000000;
            --text-color: #33ff33;
            --board-light: #0a220a;
            --board-dark: #000000;
            --hud-bg: rgba(51, 255, 51, 0.1);
            --border-color: #33ff33;
            --accent-color: #33ff33;
            --dot-color: rgba(51, 255, 51, 0.5);
            --font-family: 'Courier New', Courier, monospace;
            --piece-filter: sepia(100%) saturate(300%) hue-rotate(85deg) drop-shadow(2px 4px 6px rgba(51,255,51,0.2));
            --modal-bg: rgba(0, 0, 0, 0.95);
        }

        body[data-theme="futuristic"] {
            --bg-color: #060b14;
            --text-color: #00f2fe;
            --board-light: #1e293b;
            --board-dark: #0f172a;
            --hud-bg: rgba(0, 242, 254, 0.05);
            --border-color: #00f2fe;
            --accent-color: #9d4edd;
            --dot-color: rgba(0, 242, 254, 0.6);
            --font-family: system-ui, sans-serif;
            --piece-filter: drop-shadow(0 0 6px var(--text-color)) drop-shadow(2px 4px 6px rgba(0,0,0,0.6));
            --modal-bg: rgba(6, 11, 20, 0.95);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: var(--font-family);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        /* --- UI Shell & Top Nav --- */
        header { width: 100%; padding: 1rem 2rem; display: flex; align-items: center; gap: 20px; position: absolute; top: 0; left: 0; z-index: 10; }
        
        .home-button { display: flex; align-items: center; justify-content: center; color: var(--text-color); background: transparent; border: none; cursor: pointer; transition: transform 0.2s, opacity 0.2s; z-index: 110; }
        .home-button svg { width: 28px; height: 28px; }
        .home-button:hover { transform: scale(1.1); opacity: 0.8; }

        /* --- Main Stage & Board --- */
        main { display: flex; flex-direction: column; align-items: center; width: 100%; max-width: 560px; padding: 1rem; margin-top: 4rem; transition: filter 0.4s ease; }
        .blurred { filter: blur(10px) brightness(0.7); pointer-events: none; }
        
        .hud { display: flex; justify-content: space-between; align-items: center; width: 100%; padding: 0.75rem 1rem; background: var(--hud-bg); border: 1px solid var(--border-color); border-radius: 8px; margin: 0.5rem 0; font-size: 0.9rem; font-weight: 500; }
        .player-info { display: flex; align-items: center; gap: 8px; }
        .timer { font-family: monospace; font-size: 1.25rem; font-weight: bold; }
        .timer.active { color: var(--accent-color); }
        .points { font-size: 0.85rem; font-weight: 600; color: var(--accent-color); opacity: 0; transition: opacity 0.3s; }
        .points.visible { opacity: 1; }

        /* --- Board Wrapper & SVG Overlays --- */
        .board-wrapper {
            position: relative;
            width: 100%; 
            aspect-ratio: 1 / 1; 
            border-radius: 8px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.5); 
            margin: 0.5rem 0; 
            border: 6px solid var(--border-color);
            overflow: hidden;
        }

        .chessboard {
            display: grid; grid-template-columns: repeat(8, 1fr); grid-template-rows: repeat(8, 1fr);
            width: 100%; height: 100%; user-select: none;
        }

        #arrow-overlay {
            position: absolute; inset: 0; width: 100%; height: 100%; pointer-events: none; z-index: 20;
        }

        .check-toast {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%) scale(1);
            background: rgba(220, 38, 38, 0.95);
            color: #fff;
            font-size: 2.5rem;
            font-weight: 900;
            padding: 1rem 2.5rem;
            border-radius: 12px;
            pointer-events: none;
            z-index: 30;
            letter-spacing: 4px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            transition: opacity 0.3s ease, transform 0.3s ease;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        .check-toast.hidden {
            opacity: 0;
            transform: translate(-50%, -40%) scale(0.9);
        }

        .square { display: flex; justify-content: center; align-items: center; position: relative; cursor: pointer; }
        .square.light { background-color: var(--board-light); }
        .square.dark { background-color: var(--board-dark); }

        .piece svg { width: 80%; height: 80%; filter: var(--piece-filter); transition: transform 0.2s cubic-bezier(0.4, 0, 0.2, 1), filter 0.2s; pointer-events: none; }
        
        .square:hover .piece svg { transform: scale(1.1) translateY(-3px); }
        .square.selected .piece svg { transform: scale(1.15) translateY(-5px); filter: var(--piece-filter) drop-shadow(0 8px 10px rgba(0,0,0,0.6)); }
        
        .legal-dot { position: absolute; width: 25%; height: 25%; background-color: var(--dot-color); border-radius: 50%; pointer-events: none; animation: pulse 1.5s infinite; z-index: 2; }
        .legal-dot.capture { width: 80%; height: 80%; background-color: transparent; border: 4px solid var(--dot-color); }

        @keyframes pulse { 0% { transform: scale(0.95); opacity: 0.8; } 50% { transform: scale(1.1); opacity: 0.4; } 100% { transform: scale(0.95); opacity: 0.8; } }

        /* --- Controls & Settings Menu --- */
        .controls { display: flex; gap: 0.75rem; margin-top: 1rem; width: 100%; }
        button.btn { flex: 1; background: var(--hud-bg); color: var(--text-color); border: 1px solid var(--border-color); padding: 0.8rem; border-radius: 6px; cursor: pointer; font-weight: 600; font-family: var(--font-family); transition: background 0.2s, border-color 0.2s, transform 0.1s; }
        button.btn:hover { background: var(--border-color); opacity: 0.9; }
        button.btn:active { transform: scale(0.97); }
        #btn-hint { flex: 0.5; font-size: 1.2rem; } /* Hint button size adjustment */
        .hidden { display: none !important; }

        .overlay { position: fixed; inset: 0; z-index: 1000; display: flex; justify-content: center; align-items: center; background: rgba(0,0,0,0.3); backdrop-filter: blur(4px); transition: opacity 0.4s ease; }
        .menu-container { background: var(--modal-bg); padding: 2.5rem 2rem; border-radius: 12px; border: 2px solid var(--border-color); box-shadow: 0 20px 50px rgba(0,0,0,0.6); max-width: 450px; width: 90%; display: flex; flex-direction: column; gap: 15px; }
        .menu-container h2 { text-align: center; margin-bottom: 1rem; color: var(--accent-color); font-size: 1.8rem; }
        
        .setting-group { display: flex; justify-content: space-between; align-items: center; gap: 15px; }
        .setting-group label { font-weight: 600; flex: 1; }
        .select-input { flex: 1; padding: 0.6rem; background: var(--hud-bg); color: var(--text-color); border: 1px solid var(--border-color); border-radius: 6px; font-family: var(--font-family); outline: none; cursor: pointer; }
        
        #start-btn { margin-top: 15px; background-color: var(--accent-color); color: #fff; font-size: 1.1rem; border-color: var(--accent-color); }
        #start-btn:hover { filter: brightness(1.1); }

        /* --- Confetti --- */
        .confetti { position: fixed; top: -10px; width: 10px; height: 20px; z-index: 2000; animation: fall linear forwards; opacity: 0.9; }
        @keyframes fall { to { transform: translateY(110vh) rotate(720deg); } }
    </style>
</head>
<body data-theme="classic"> 
    <header>
        <button id="home-btn" class="home-button" aria-label="Home">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
                <path d="M11.47 3.841a.75.75 0 0 1 1.06 0l8.99 8.99a.75.75 0 1 1-1.06 1.06L20 13.432V21a.75.75 0 0 1-.75.75h-4.5a.75.75 0 0 1-.75-.75v-3.5a.75.75 0 0 0-.75-.75h-2.5a.75.75 0 0 0-.75.75v3.5a.75.75 0 0 1-.75.75H4.75a.75.75 0 0 1-.75-.75v-7.568L3.53 13.89a.75.75 0 1 1-1.06-1.06l8.99-8.99Z" />
            </svg>
        </button>
    </header>

    <div id="home-menu-overlay" class="overlay">
        <div class="menu-container">
            <h2>Game Settings</h2>
            
            <div class="setting-group">
                <label for="setting-mode">Game Type:</label>
                <select id="setting-mode" class="select-input">
                    <option value="llm">Play vs LLM</option>
                    <option value="pvp">Offline Friend</option>
                </select>
            </div>

            <div class="setting-group">
                <label for="setting-color">Play As:</label>
                <select id="setting-color" class="select-input">
                    <option value="w">White</option>
                    <option value="b">Black</option>
                </select>
            </div>

            <div class="setting-group">
                <label for="setting-time">Game Mode:</label>
                <select id="setting-time" class="select-input">
                    <option value="600">Standard (10 min)</option>
                    <option value="180">Blitz (3 min)</option>
                </select>
            </div>

            <div class="setting-group">
                <label for="setting-theme">Visual Theme:</label>
                <select id="setting-theme" class="select-input">
                    <option value="classic" selected>Classic</option> 
                    <option value="dark">Dark Mode</option>
                    <option value="terminal">Terminal Edition</option>
                    <option value="futuristic">Futuristic</option>
                </select>
            </div>

            <button class="btn" id="start-btn">Start Game</button>
        </div>
    </div>

    <main id="main-content" class="blurred">
        <div class="hud top">
            <div class="player-info">
                <span id="opponent-name">Opponent</span>
                <span class="points" id="top-points"></span>
            </div>
            <div class="timer" id="top-timer">10:00</div>
        </div>

        <div class="board-wrapper">
            <div id="board" class="chessboard"></div>
            
            <svg id="arrow-overlay">
                <defs>
                    <marker id="arrowhead" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
                        <polygon points="0 0, 6 3, 0 6" fill="rgba(59, 130, 246, 0.8)"/>
                    </marker>
                </defs>
            </svg>

            <div id="check-toast" class="check-toast hidden">CHECK!</div>
        </div>

        <div class="hud bottom">
            <div class="player-info">
                <span>Player</span>
                <span class="points" id="bottom-points"></span>
            </div>
            <div class="timer" id="bottom-timer">10:00</div>
        </div>

        <div class="controls">
            <button class="btn" id="btn-restart">Restart</button>
            <button class="btn" id="btn-hint" title="Hint">💡</button>
            <button class="btn" id="btn-undo">Undo</button>
            <button class="btn" id="btn-resign">Give Up</button>
        </div>
    </main>

    <script>
        // --- 1. Centralized Application State & Hardcoded Key ---
        const LLM_API_KEY = "YOUR_PROVIDED_API_KEY_HERE";

        const STATE = {
            mode: 'llm',
            theme: 'classic', 
            playerColor: null, 
            isBoardLocked: true, 
            isGameActive: false, 
            selectedSquare: null,
            timerInterval: null,
            timeControl: 600, 
            timeLeft: { w: 600, b: 600 },
            llmTimerInterval: null 
        };

        const PIECE_VALUES = { 'p': 1, 'n': 3, 'b': 3, 'r': 5, 'q': 9, 'k': 0 };
        const game = new Chess();
        const boardEl = document.getElementById('board');
        const arrowSvg = document.getElementById('arrow-overlay');
        
        // UI Framework Element Hooks
        const topTimerEl = document.getElementById('top-timer');
        const bottomTimerEl = document.getElementById('bottom-timer');
        const topPointsEl = document.getElementById('top-points');
        const bottomPointsEl = document.getElementById('bottom-points');
        const opponentNameEl = document.getElementById('opponent-name');

        // --- 2. Upgraded True White and Black Pieces ---
        const bStyle = 'font-size="38" font-family="Arial, sans-serif" font-weight="bold" fill="#000000"';
        const wStyle = 'font-size="38" font-family="Arial, sans-serif" font-weight="bold" fill="#ffffff" stroke="#000000" stroke-width="1.5" paint-order="stroke fill"';
        
        const PIECE_MAP = {
            'p': `<svg viewBox="0 0 45 45"><text x="50%" y="54%" dominant-baseline="central" text-anchor="middle" ${bStyle}>♟&#xFE0E;</text></svg>`,
            'n': `<svg viewBox="0 0 45 45"><text x="50%" y="54%" dominant-baseline="central" text-anchor="middle" ${bStyle}>♞&#xFE0E;</text></svg>`,
            'b': `<svg viewBox="0 0 45 45"><text x="50%" y="54%" dominant-baseline="central" text-anchor="middle" ${bStyle}>♝&#xFE0E;</text></svg>`,
            'r': `<svg viewBox="0 0 45 45"><text x="50%" y="54%" dominant-baseline="central" text-anchor="middle" ${bStyle}>♜&#xFE0E;</text></svg>`,
            'q': `<svg viewBox="0 0 45 45"><text x="50%" y="54%" dominant-baseline="central" text-anchor="middle" ${bStyle}>♛&#xFE0E;</text></svg>`,
            'k': `<svg viewBox="0 0 45 45"><text x="50%" y="54%" dominant-baseline="central" text-anchor="middle" ${bStyle}>♚&#xFE0E;</text></svg>`,
            'P': `<svg viewBox="0 0 45 45"><text x="50%" y="54%" dominant-baseline="central" text-anchor="middle" ${wStyle}>♟&#xFE0E;</text></svg>`,
            'N': `<svg viewBox="0 0 45 45"><text x="50%" y="54%" dominant-baseline="central" text-anchor="middle" ${wStyle}>♞&#xFE0E;</text></svg>`,
            'B': `<svg viewBox="0 0 45 45"><text x="50%" y="54%" dominant-baseline="central" text-anchor="middle" ${wStyle}>♝&#xFE0E;</text></svg>`,
            'R': `<svg viewBox="0 0 45 45"><text x="50%" y="54%" dominant-baseline="central" text-anchor="middle" ${wStyle}>♜&#xFE0E;</text></svg>`,
            'Q': `<svg viewBox="0 0 45 45"><text x="50%" y="54%" dominant-baseline="central" text-anchor="middle" ${wStyle}>♛&#xFE0E;</text></svg>`,
            'K': `<svg viewBox="0 0 45 45"><text x="50%" y="54%" dominant-baseline="central" text-anchor="middle" ${wStyle}>♚&#xFE0E;</text></svg>`
        };

        // --- Visual Feedback & Overlays ---
        function showCheckToast() {
            const toast = document.getElementById('check-toast');
            toast.classList.remove('hidden');
            setTimeout(() => {
                toast.classList.add('hidden');
            }, 2000);
        }

        function drawHintArrow(fromSq, toSq) {
            clearHighlights(); // Clear old hints before drawing new ones

            const isWhiteBottom = STATE.playerColor === 'w';
            const getCoords = (sq) => {
                const file = sq.charCodeAt(0) - 97; // 'a' = 0
                const rank = parseInt(sq[1]) - 1; // '1' = 0
                const col = isWhiteBottom ? file : 7 - file;
                const row = isWhiteBottom ? 7 - rank : rank;
                return { x: (col + 0.5) * 12.5, y: (row + 0.5) * 12.5 };
            };
            
            const fromC = getCoords(fromSq);
            const toC = getCoords(toSq);
            
            const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
            line.setAttribute('x1', `${fromC.x}%`);
            line.setAttribute('y1', `${fromC.y}%`);
            line.setAttribute('x2', `${toC.x}%`);
            line.setAttribute('y2', `${toC.y}%`);
            line.setAttribute('stroke', 'rgba(59, 130, 246, 0.8)');
            line.setAttribute('stroke-width', '2%');
            line.setAttribute('marker-end', 'url(#arrowhead)');
            line.classList.add('hint-arrow'); // Hook to delete later
            
            arrowSvg.appendChild(line);
        }

        function triggerHint() {
            const moves = game.moves({ verbose: true });
            if (moves.length === 0) return;
            
            // Prioritize captures and checks for a "smarter" hint, fallback to random
            let bestMove = moves.find(m => m.flags.includes('c') || m.flags.includes('p') || m.flags.includes('+'));
            if (!bestMove) bestMove = moves[Math.floor(Math.random() * moves.length)];
            
            drawHintArrow(bestMove.from, bestMove.to);
        }

        function launchConfetti() {
            const colors = ['#f44336', '#e91e63', '#9c27b0', '#673ab7', '#3f51b5', '#2196f3', '#03a9f4', '#00bcd4', '#009688', '#4CAF50', '#8BC34A', '#CDDC39', '#FFEB3B', '#FFC107', '#FF9800', '#FF5722'];
            for (let i = 0; i < 150; i++) {
                const conf = document.createElement('div');
                conf.classList.add('confetti');
                conf.style.left = Math.random() * 100 + 'vw';
                conf.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                conf.style.animationDuration = (Math.random() * 3 + 2) + 's';
                conf.style.animationDelay = Math.random() * 1.5 + 's';
                document.body.appendChild(conf);
                setTimeout(() => conf.remove(), 6000);
            }
        }

        // --- Timers & Mechanics ---
        function formatTime(seconds) {
            const m = Math.floor(seconds / 60);
            const s = seconds % 60;
            return `${m}:${s.toString().padStart(2, '0')}`;
        }

        function updateTimerUI() {
            if (!STATE.playerColor) return;
            const pColor = STATE.playerColor;
            const oColor = pColor === 'w' ? 'b' : 'w';

            bottomTimerEl.textContent = formatTime(STATE.timeLeft[pColor]);
            topTimerEl.textContent = formatTime(STATE.timeLeft[oColor]);
            
            if (STATE.isGameActive && !game.game_over()) {
                bottomTimerEl.classList.toggle('active', game.turn() === pColor);
                topTimerEl.classList.toggle('active', game.turn() === oColor);
            } else {
                bottomTimerEl.classList.remove('active');
                topTimerEl.classList.remove('active');
            }
        }

        function startClock() {
            if (STATE.timerInterval) clearInterval(STATE.timerInterval);
            STATE.timerInterval = setInterval(() => {
                if (!STATE.isGameActive || game.game_over()) return; 
                
                const turn = game.turn();
                STATE.timeLeft[turn]--;
                updateTimerUI();

                if (STATE.timeLeft[turn] <= 0) {
                    clearInterval(STATE.timerInterval);
                    STATE.isGameActive = false;
                    STATE.isBoardLocked = true;
                    alert(`Time out! ${turn === 'w' ? 'Black' : 'White'} wins.`);
                }
            }, 1000);
        }

        function calculateMaterial() {
            if (!STATE.playerColor) return;
            let pScore = 0, oScore = 0;
            const currentBoard = game.board();
            const pColor = STATE.playerColor;
            
            for (let r = 0; r < 8; r++) {
                for (let f = 0; f < 8; f++) {
                    const piece = currentBoard[r][f];
                    if (piece) {
                        if (piece.color === pColor) pScore += PIECE_VALUES[piece.type];
                        else oScore += PIECE_VALUES[piece.type];
                    }
                }
            }

            const diff = pScore - oScore;
            topPointsEl.classList.remove('visible');
            bottomPointsEl.classList.remove('visible');

            if (diff > 0) {
                bottomPointsEl.textContent = `+${diff}`;
                bottomPointsEl.classList.add('visible');
            } else if (diff < 0) {
                topPointsEl.textContent = `+${Math.abs(diff)}`;
                topPointsEl.classList.add('visible');
            }
        }

        // --- Visual Rendering ---
        function createBoardLayout() {
            if (!STATE.playerColor) return;
            boardEl.innerHTML = '';
            
            const ranks = STATE.playerColor === 'w' ? [8,7,6,5,4,3,2,1] : [1,2,3,4,5,6,7,8];
            const fileChars = STATE.playerColor === 'w' ? ['a','b','c','d','e','f','g','h'] : ['h','g','f','e','d','c','b','a'];
            
            let isLight = true;
            for (let r = 0; r < 8; r++) {
                for (let f = 0; f < 8; f++) {
                    const square = document.createElement('div');
                    square.classList.add('square', isLight ? 'light' : 'dark');
                    square.dataset.square = fileChars[f] + ranks[r];
                    boardEl.appendChild(square);
                    isLight = !isLight;
                }
                isLight = !isLight;
            }
        }

        function populatePieces() {
            const currentBoard = game.board();
            for (let r = 0; r < 8; r++) {
                for (let f = 0; f < 8; f++) {
                    const pieceObj = currentBoard[r][f];
                    const fileChars = ['a','b','c','d','e','f','g','h'];
                    const squareId = fileChars[f] + (8 - r);
                    
                    const squareEl = document.querySelector(`[data-square="${squareId}"]`);
                    if(squareEl) {
                        squareEl.innerHTML = '';
                        squareEl.classList.remove('selected');

                        if (pieceObj) {
                            const pieceKey = pieceObj.color === 'w' ? pieceObj.type.toUpperCase() : pieceObj.type.toLowerCase();
                            squareEl.innerHTML = `<div class="piece">${PIECE_MAP[pieceKey]}</div>`;
                        }
                    }
                }
            }
            calculateMaterial(); 
            updateTimerUI(); 
        }

        // --- Game Logic ---
        function clearHighlights() {
            document.querySelectorAll('.legal-dot').forEach(el => el.remove());
            document.querySelectorAll('.square.selected').forEach(el => el.classList.remove('selected'));
            document.querySelectorAll('.hint-arrow').forEach(el => el.remove());
        }

        function showLegalMoves(square) {
            const moves = game.moves({ square: square, verbose: true });
            moves.forEach(move => {
                const targetSq = document.querySelector(`[data-square="${move.to}"]`);
                if (targetSq) {
                    const dot = document.createElement('div');
                    const isCapture = game.get(move.to) !== null;
                    dot.classList.add('legal-dot');
                    if(isCapture) dot.classList.add('capture');
                    targetSq.appendChild(dot);
                }
            });
        }

        function executeMove(source, target) {
            const move = game.move({ from: source, to: target, promotion: 'q' });

            if (move) {
                populatePieces();
                clearHighlights(); // Clear arrows and dots immediately
                
                if (game.in_check()) showCheckToast();

                const isOver = checkGameOver();
                
                // Trigger LLM if applicable
                if (!isOver && STATE.mode === 'llm' && game.turn() !== STATE.playerColor) {
                    executeLlmTurn();
                }
            }
            return move;
        }

        function checkGameOver() {
            if (game.game_over()) {
                STATE.isBoardLocked = true;
                STATE.isGameActive = false;
                if (STATE.timerInterval) clearInterval(STATE.timerInterval);
                
                if (game.in_checkmate()) {
                    launchConfetti();
                    alert(`Checkmate! ${game.turn() === 'w' ? 'Black' : 'White'} wins.`);
                } else if (game.in_draw()) {
                    alert("The match concluded in a Draw!");
                } else if (game.in_stalemate()) {
                    alert("Stalemate reached!");
                }
                return true;
            }
            return false;
        }

        boardEl.addEventListener('click', (e) => {
            if (STATE.isBoardLocked || (STATE.mode === 'llm' && game.turn() !== STATE.playerColor)) return;

            const squareEl = e.target.closest('.square');
            if (!squareEl) return;

            const clickedSquare = squareEl.dataset.square;
            const pieceOnSquare = game.get(clickedSquare);

            if (STATE.selectedSquare === clickedSquare) {
                clearHighlights();
                STATE.selectedSquare = null;
                return;
            }

            if (STATE.selectedSquare) {
                const moves = game.moves({ square: STATE.selectedSquare, verbose: true });
                const isValidMove = moves.some(m => m.to === clickedSquare);

                if (isValidMove) {
                    executeMove(STATE.selectedSquare, clickedSquare);
                    STATE.selectedSquare = null;
                    return;
                }
            }

            if (pieceOnSquare && pieceOnSquare.color === game.turn()) {
                clearHighlights();
                STATE.selectedSquare = clickedSquare;
                squareEl.classList.add('selected');
                showLegalMoves(clickedSquare);
            } else {
                clearHighlights();
                STATE.selectedSquare = null;
            }
        });

        // --- LLM Engine Integration ---
        async function executeLlmTurn() {
            STATE.isBoardLocked = true;
            
            let llmSeconds = 0;
            opponentNameEl.textContent = `LLM (Thinking: ${llmSeconds}s)`;
            if (STATE.llmTimerInterval) clearInterval(STATE.llmTimerInterval);
            
            STATE.llmTimerInterval = setInterval(() => {
                llmSeconds++;
                opponentNameEl.textContent = `LLM (Thinking: ${llmSeconds}s)`;
            }, 1000);

            const legalMoves = game.moves();
            const currentFen = game.fen();
            const engineColor = STATE.playerColor === 'w' ? 'Black' : 'White';

            const instructionPrompt = `You are an elite chess grandmaster engine playing as ${engineColor}. 
Your evaluation must strictly consider positional advantage, king safety, and material trades.
The game state is defined by this FEN variant: "${currentFen}"
The absolute list of permissible legal moves on this turn is: ${JSON.stringify(legalMoves)}

Select your move immediately. You must output a valid move string present inside the array.
Respond with a JSON object format matching this architecture exactly: {"move": "your_chosen_move"}`;

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${LLM_API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: instructionPrompt }] }],
                        generationConfig: { responseMimeType: "application/json" }
                    })
                });

                if (!response.ok) throw new Error("API Connection Interrupted");

                const data = await response.json();
                const cleanJsonText = data.candidates[0].content.parts[0].text;
                const parsedResponse = JSON.parse(cleanJsonText);
                
                let selectedMove = parsedResponse.move;

                if (!legalMoves.includes(selectedMove)) {
                    console.warn(`LLM hallucination ("${selectedMove}"). Executing fallback.`);
                    selectedMove = legalMoves[Math.floor(Math.random() * legalMoves.length)];
                }

                game.move(selectedMove);

            } catch (error) {
                console.error("Gemini Failure:", error);
                const emergencyMove = legalMoves[Math.floor(Math.random() * legalMoves.length)];
                game.move(emergencyMove);
            } finally {
                clearInterval(STATE.llmTimerInterval);
                opponentNameEl.textContent = "LLM (Gemini)";
                STATE.isBoardLocked = false;
                populatePieces();
                if (game.in_check()) showCheckToast();
                checkGameOver();
            }
        }

        // --- Core UI Navigation Flow ---
        document.addEventListener('DOMContentLoaded', () => {
            const homeBtn = document.getElementById('home-btn');
            const startBtn = document.getElementById('start-btn');
            const homeMenuOverlay = document.getElementById('home-menu-overlay');
            const mainContent = document.getElementById('main-content');

            homeBtn.addEventListener('click', () => {
                STATE.isGameActive = false; 
                if(STATE.timerInterval) clearInterval(STATE.timerInterval);
                
                homeMenuOverlay.classList.remove('hidden');
                mainContent.classList.add('blurred');
            });

            startBtn.addEventListener('click', () => {
                STATE.mode = document.getElementById('setting-mode').value;
                STATE.playerColor = document.getElementById('setting-color').value;
                STATE.timeControl = parseInt(document.getElementById('setting-time').value, 10);
                
                STATE.theme = document.getElementById('setting-theme').value;
                document.body.setAttribute('data-theme', STATE.theme);

                opponentNameEl.textContent = STATE.mode === 'pvp' ? 'Player 2' : 'LLM (Gemini)';

                homeMenuOverlay.classList.add('hidden');
                mainContent.classList.remove('blurred');

                resetGame();
            });

            // Added Restart Control
            document.getElementById('btn-restart').addEventListener('click', () => {
                resetGame();
            });

            // Added Hint Control
            document.getElementById('btn-hint').addEventListener('click', () => {
                // Prevent hints if game is over, locked, or it's the LLM's turn
                if (STATE.isBoardLocked || (STATE.mode === 'llm' && game.turn() !== STATE.playerColor)) return;
                triggerHint();
            });

            document.getElementById('btn-undo').addEventListener('click', () => {
                if(STATE.isBoardLocked) return; 
                if(game.history().length === 0) return;
                
                game.undo();
                if (STATE.mode === 'llm' && game.turn() !== STATE.playerColor) game.undo(); 
                
                clearHighlights();
                populatePieces();
                STATE.isBoardLocked = false;
                STATE.selectedSquare = null;
            });

            document.getElementById('btn-resign').addEventListener('click', () => {
                if(game.game_over() || (STATE.isBoardLocked && game.history().length === 0)) return;
                alert(`Match forfeited! ${game.turn() === 'w' ? 'Black' : 'White'} claims victory.`);
                launchConfetti();
                STATE.isBoardLocked = true;
                STATE.isGameActive = false;
                if(STATE.timerInterval) clearInterval(STATE.timerInterval);
            });
        });

        function resetGame() {
            game.reset();
            clearHighlights();
            STATE.timeLeft = { w: STATE.timeControl, b: STATE.timeControl };
            STATE.isBoardLocked = false;
            STATE.isGameActive = true; 
            STATE.selectedSquare = null;
            
            createBoardLayout(); 
            populatePieces();
            startClock();

            if (STATE.mode === 'llm' && STATE.playerColor === 'b') {
                executeLlmTurn();
            }
        }
    </script>
</body>
</html>
